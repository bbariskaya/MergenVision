services:
  postgres:
    image: postgres:16-alpine
    container_name: mergenvision-postgres
    environment:
      POSTGRES_USER: mergen
      POSTGRES_PASSWORD: mergen
      POSTGRES_DB: mergenvision
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mergen -d mergenvision"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mergenvision-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mergenvision-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mergenvision-api
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mergen:mergen@postgres:5432/mergenvision
      QDRANT_URL: http://qdrant:6333
      MINIO_URL: minio:9000
      MINIO_PUBLIC_URL: localhost:9002
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_PEOPLE_PHOTOS: people-photos
      MINIO_BUCKET_FACE_CROPS: face-crops
      MINIO_BUCKET_QUERY_IMAGES: query-images
      MINIO_SECURE: "false"
      TRT_ENGINE_DIR: /app/artifacts/trt_engines
      GPU_DEVICE_ID: "0"
    volumes:
      - ./artifacts/trt_engines:/app/artifacts/trt_engines:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mergenvision-frontend
    ports:
      - "8080:80"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
  qdrant_storage:
  minio_data:
