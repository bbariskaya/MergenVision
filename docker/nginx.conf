log_format upstream_log '$remote_addr - $remote_user [$time_local] "$request" '
                        'upstream=$upstream_addr status=$status';

upstream api_backend {
    server api-gpu-0:8000 max_fails=0;
    server api-gpu-1:8000 max_fails=0;
    server api-gpu-2:8000 max_fails=0;
}

server {
    listen 8000;
    server_name localhost;

    access_log /var/log/nginx/access.log upstream_log;

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.0;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
